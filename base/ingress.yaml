apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yusi-ingress
  namespace: yusi
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: yusi.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: yusi-frontend
            port:
              number: 8080
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: yusi-backend
            port:
              number: 20611
      - path: /mcp
        pathType: Prefix
        backend:
          service:
            name: yusi-mcp
            port:
              number: 11611
  tls:
  - hosts:
    - yusi.yourdomain.com
    secretName: yusi-tls-cert
