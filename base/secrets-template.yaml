apiVersion: v1
kind: Secret
metadata:
  name: yusi-secret
  namespace: yusi
type: Opaque
stringData:
  MYSQL_PASSWORD: "YOUR_REAL_MYSQL_PASSWORD"
  CHAT_MODEL_APIKEY: "your-deepseek-or-qwen-api-key"
  EMBEDDING_MODEL_APIKEY: "your-siliconflow-embedding-api-key"
  YUSI_ENCRYPTION_KEY: "your-32-byte-base64-aes-key"
  AMAP_JS_KEY: "your-amap-js-api-key"
  AMAP_SECURITY_CODE: "your-amap-security-code"
