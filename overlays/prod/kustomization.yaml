apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: yusi-prod

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: yusi.aseubel.com
    - op: replace
      path: /spec/tls/0/hosts/0
      value: yusi.aseubel.com
  target:
    kind: Ingress
    name: yusi-ingress
images:
- name: yusi-backend
  newName: ghcr.io/aseubel/yusi/yusi-backend
  newTag: 9222a0710b088c9ec4eb4fa68a857a09fbec5977
- name: yusi-frontend
  newName: ghcr.io/aseubel/yusi/yusi-frontend
  newTag: 9222a0710b088c9ec4eb4fa68a857a09fbec5977
- name: yusi-mcp
  newName: ghcr.io/aseubel/yusi/yusi-mcp
  newTag: 9222a0710b088c9ec4eb4fa68a857a09fbec5977
