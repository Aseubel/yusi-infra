apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: yusi-prod

resources:
  - ../../base

patches:
  - target:
      kind: Ingress
      name: yusi-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: yusi.aseubel.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: yusi.aseubel.com
